services:
  db:
    image: mysql:8.4
    container_name: sport_coaching_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sport_coaching_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build: .
    container_name: sport_coaching_api
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "4000:4000"
    command: sh -c "npx prisma migrate deploy && npm run start"

volumes:
  mysql_data:
